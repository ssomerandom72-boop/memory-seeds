<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Seeds</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState } = React;

    function MemorySeeds() {
      const [screen, setScreen] = useState('forest');
      const [seeds, setSeeds] = useState([]);
      const [expandedId, setExpandedId] = useState(null);
      const [newSeed, setNewSeed] = useState({ type: 'oak', name: '', date: '' });

      const getTreeStage = (daysUntil, status) => {
        if (status === 'ripened') return 4;
        if (status === 'memory') return 5;
        if (!daysUntil) return 5;
        if (daysUntil > 60) return 1;
        if (daysUntil > 30) return 2;
        if (daysUntil > 0) return 3;
        return 4;
      };

      const TreeSVG = ({ type, stage }) => {
        if (type === 'oak') {
          return React.createElement('svg', { viewBox: '0 0 100 120', style: { width: '80px', height: '96px' } },
            React.createElement('rect', { x: '42', y: '70', width: '16', height: '40', fill: '#8B6F47' }),
            React.createElement('ellipse', { cx: '50', cy: '50', rx: '35', ry: '40', fill: '#2D5016' }),
            React.createElement('ellipse', { cx: '30', cy: '45', rx: '20', ry: '25', fill: '#3A6B2C' }),
            React.createElement('ellipse', { cx: '70', cy: '45', rx: '20', ry: '25', fill: '#3A6B2C' }),
            React.createElement('ellipse', { cx: '50', cy: '25', rx: '15', ry: '18', fill: '#4A8C3C' })
          );
        }
        if (type === 'cherry') {
          const colors = ['#E8D5C4', '#F0DCC4', '#F5E6D3', '#FFB6C1'];
          const c = colors[Math.min(stage - 1, 3)];
          return React.createElement('svg', { viewBox: '0 0 100 120', style: { width: '80px', height: '96px' } },
            React.createElement('rect', { x: '44', y: '75', width: '12', height: '40', fill: '#8B7355' }),
            React.createElement('circle', { cx: '50', cy: '55', r: 20 + stage * 2, fill: c, opacity: '0.8' }),
            React.createElement('circle', { cx: '35', cy: '50', r: 12 + stage, fill: c, opacity: '0.7' }),
            React.createElement('circle', { cx: '65', cy: '50', r: 12 + stage, fill: c, opacity: '0.7' }),
            React.createElement('circle', { cx: '50', cy: '35', r: 10 + stage, fill: c, opacity: '0.9' })
          );
        }
        if (type === 'spruce') {
          const colors = ['#1B4D3E', '#2D6A5C', '#3D8B7D', '#4FA99F'];
          const color = colors[Math.min(stage - 1, 3)];
          return React.createElement('svg', { viewBox: '0 0 100 120', style: { width: '80px', height: '96px' } },
            React.createElement('rect', { x: '44', y: '80', width: '12', height: '35', fill: '#5C4033' }),
            React.createElement('polygon', { points: '50,20 30,65 70,65', fill: color }),
            React.createElement('polygon', { points: '50,35 35,65 65,65', fill: color, opacity: '0.8' })
          );
        }
      };

      if (screen === 'forest') {
        return React.createElement('div', { style: { minHeight: '100vh', background: 'linear-gradient(to bottom, #fef3c7, #dcfce7, #dbeafe)', padding: '1rem', paddingBottom: '6rem' } },
          React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', marginTop: '1rem' } },
            React.createElement('h1', { style: { fontSize: '1.875rem', fontFamily: 'Georgia, serif', color: '#065f46' } }, 'Your Forest'),
            React.createElement('button', { onClick: () => setScreen('settings'), style: { padding: '0.5rem', cursor: 'pointer', border: 'none', background: 'white', borderRadius: '0.5rem', fontSize: '1.25rem' } }, '⚙️')
          ),
          seeds.length === 0 ? 
            React.createElement('div', { style: { textAlign: 'center', marginTop: '3rem' } },
              React.createElement('p', { style: { fontSize: '3rem', marginBottom: '1rem' } }, '🌱'),
              React.createElement('p', { style: { color: '#6b7280', fontSize: '1rem' } }, 'Your forest is empty'),
              React.createElement('p', { style: { color: '#9ca3af', fontSize: '0.875rem', marginTop: '0.5rem' } }, 'Plant your first seed to get started')
            )
          :
            React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '1.5rem', marginBottom: '1rem' } },
              seeds.map(seed => {
                const stage = getTreeStage(seed.daysUntil, seed.status);
                const isExpanded = expandedId === seed.id;
                return React.createElement('div', { key: seed.id, onClick: () => setExpandedId(isExpanded ? null : seed.id), style: { cursor: 'pointer' } },
                  React.createElement('div', { style: { background: 'white', borderRadius: '1rem', padding: '1rem', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', border: seed.status === 'ripened' ? '2px solid #fbbf24' : 'none' } },
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center' } },
                      React.createElement(TreeSVG, { type: seed.type, stage: stage }),
                      React.createElement('h3', { style: { marginTop: '0.75rem', textAlign: 'center', fontSize: '0.875rem', color: '#374151' } }, seed.name),
                      React.createElement('div', { style: { display: 'flex', gap: '0.25rem', marginTop: '0.5rem' } },
                        [1,2,3,4,5].map(s => React.createElement('div', { key: s, style: { height: '6px', width: '8px', borderRadius: '9999px', background: s <= stage ? '#10b981' : '#d1d5db' } }))
                      ),
                      seed.status !== 'memory' && React.createElement('div', { style: { marginTop: '0.5rem', fontSize: '0.75rem', color: '#4b5563' } },
                        seed.status === 'ripened' ? React.createElement('span', { style: { color: '#b45309', fontWeight: 'bold' } }, '🌟 Ripened!') : seed.daysUntil + ' days'
                      ),
                      isExpanded && React.createElement('div', { style: { marginTop: '1rem', width: '100%', borderTop: '1px solid #e5e7eb', paddingTop: '1rem' } },
                        seed.type === 'oak' && React.createElement('div', { style: { background: '#f0fdf4', borderRadius: '0.5rem', padding: '0.75rem', fontSize: '0.75rem', color: '#065f46' } }, '📸 ' + (seed.photos || 0) + ' photos'),
                        seed.status === 'ripened' && React.createElement('div', { style: { display: 'flex', gap: '0.5rem', marginTop: '0.75rem' } },
                          React.createElement('button', { onClick: (e) => { e.stopPropagation(); setSeeds(seeds.map(s => s.id === seed.id ? { ...s, status: 'archived' } : s)); setExpandedId(null); }, style: { flex: 1, background: '#059669', color: 'white', padding: '0.5rem', borderRadius: '0.5rem', border: 'none', cursor: 'pointer', fontSize: '0.75rem' } }, '✓ Keep'),
                          React.createElement('button', { onClick: (e) => { e.stopPropagation(); setSeeds(seeds.filter(s => s.id !== seed.id)); setExpandedId(null); }, style: { flex: 1, background: '#d1d5db', color: '#374151', padding: '0.5rem', borderRadius: '0.5rem', border: 'none', cursor: 'pointer', fontSize: '0.75rem' } }, '✕ Discard')
                        )
                      )
                    )
                  )
                );
              })
            ),
          React.createElement('button', { onClick: () => setScreen('plant'), style: { position: 'fixed', bottom: '1.5rem', right: '1.5rem', width: '64px', height: '64px', background: 'linear-gradient(to bottom right, #4ade80, #059669)', color: 'white', border: 'none', borderRadius: '9999px', fontSize: '1.75rem', cursor: 'pointer', boxShadow: '0 20px 25px rgba(0,0,0,0.2)' } }, '+')
        );
      }

      if (screen === 'plant') {
        return React.createElement('div', { style: { minHeight: '100vh', background: 'linear-gradient(to bottom, #fef3c7, #dbeafe)', padding: '1rem', paddingBottom: '6rem' } },
          React.createElement('div', { style: { display: 'flex', gap: '0.75rem', marginBottom: '2rem', marginTop: '1rem' } },
            React.createElement('button', { onClick: () => setScreen('forest'), style: { padding: '0.5rem', border: 'none', background: 'white', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '1.25rem' } }, '✕'),
            React.createElement('h2', { style: { fontSize: '1.5rem', fontFamily: 'Georgia, serif', color: '#065f46' } }, 'Plant a Seed')
          ),
          React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.75rem', marginBottom: '2rem' } },
            [
              { id: 'oak', name: '🌳 Great Oak', desc: 'A cherished past memory' },
              { id: 'cherry', name: '🌸 Cherry Blossom', desc: 'Birthday or annual event' },
              { id: 'spruce', name: '🌲 Dark Spruce', desc: 'Something to remember' },
            ].map(t =>
              React.createElement('button', { key: t.id, onClick: () => setNewSeed({ ...newSeed, type: t.id }), style: { padding: '1rem', borderRadius: '1rem', textAlign: 'left', border: newSeed.type === t.id ? '2px solid #10b981' : '2px solid #e5e7eb', background: newSeed.type === t.id ? '#ecfdf5' : 'white', cursor: 'pointer' } },
                React.createElement('div', { style: { fontWeight: '500', color: '#111827' } }, t.name),
                React.createElement('div', { style: { fontSize: '0.75rem', color: '#6b7280', marginTop: '0.25rem' } }, t.desc)
              )
            )
          ),
          React.createElement('div', { style: { marginBottom: '1.5rem' } },
            React.createElement('label', { style: { display: 'block', fontSize: '0.875rem', fontWeight: '500', color: '#374151', marginBottom: '0.5rem' } }, 'Memory name'),
            React.createElement('input', { type: 'text', placeholder: 'e.g., Family Picnic', value: newSeed.name, onChange: (e) => setNewSeed({ ...newSeed, name: e.target.value }), style: { width: '100%', padding: '0.75rem', border: '1px solid #d1d5db', borderRadius: '0.5rem', fontFamily: 'inherit' } })
          ),
          newSeed.type !== 'oak' && React.createElement('div', { style: { marginBottom: '1.5rem' } },
            React.createElement('label', { style: { display: 'block', fontSize: '0.875rem', fontWeight: '500', color: '#374151', marginBottom: '0.5rem' } }, 'Ripening date'),
            React.createElement('input', { type: 'date', value: newSeed.date, onChange: (e) => setNewSeed({ ...newSeed, date: e.target.value }), style: { width: '100%', padding: '0.75rem', border: '1px solid #d1d5db', borderRadius: '0.5rem', fontFamily: 'inherit' } })
          ),
          React.createElement('button', { onClick: () => { if (newSeed.name && (newSeed.type === 'oak' || newSeed.date)) { setSeeds([...seeds, { id: Math.max(...seeds.map(s => s.id), 0) + 1, type: newSeed.type, name: newSeed.name, status: 'growing', daysUntil: newSeed.date ? Math.ceil((new Date(newSeed.date) - new Date()) / (1000 * 60 * 60 * 24)) : null, photos: 0, created: new Date().toISOString().split('T')[0] }]); setNewSeed({ type: 'oak', name: '', date: '' }); setScreen('forest'); } }, style: { width: '100%', padding: '1rem', background: 'linear-gradient(to right, #10b981, #059669)', color: 'white', border: 'none', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: '500' } }, '🌱 Plant This Seed')
        );
      }

      if (screen === 'settings') {
        return React.createElement('div', { style: { minHeight: '100vh', background: 'linear-gradient(to bottom, #fef3c7, #dbeafe)', padding: '1rem', paddingBottom: '6rem' } },
          React.createElement('div', { style: { display: 'flex', gap: '0.75rem', marginBottom: '2rem', marginTop: '1rem' } },
            React.createElement('button', { onClick: () => setScreen('forest'), style: { padding: '0.5rem', border: 'none', background: 'white', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '1.25rem' } }, '✕'),
            React.createElement('h2', { style: { fontSize: '1.5rem', fontFamily: 'Georgia, serif', color: '#065f46' } }, 'Settings')
          ),
          React.createElement('div', { style: { background: 'white', borderRadius: '1rem', padding: '1.5rem', marginBottom: '1.5rem', boxShadow: '0 10px 15px rgba(0,0,0,0.1)' } },
            React.createElement('h3', { style: { fontWeight: '500', color: '#111827', marginBottom: '1rem' } }, 'Daily Alerts'),
            React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.75rem' } },
              ['Show all ripened trees', 'Random reflection', 'No alerts'].map(opt =>
                React.createElement('label', { key: opt, style: { display: 'flex', gap: '0.75rem', padding: '0.75rem', border: '1px solid #e5e7eb', borderRadius: '0.5rem', cursor: 'pointer' } },
                  React.createElement('input', { type: 'radio', name: 'alert', defaultChecked: opt === 'Show all ripened trees' }),
                  React.createElement('span', { style: { fontSize: '0.875rem', color: '#374151' } }, opt)
                )
              )
            )
          ),
          React.createElement('div', { style: { background: 'white', borderRadius: '1rem', padding: '1.5rem', boxShadow: '0 10px 15px rgba(0,0,0,0.1)' } },
            React.createElement('h3', { style: { fontWeight: '500', color: '#111827', marginBottom: '1rem' } }, 'Notifications'),
            React.createElement('label', { style: { display: 'flex', gap: '0.75rem', cursor: 'pointer' } },
              React.createElement('input', { type: 'checkbox', defaultChecked: true }),
              React.createElement('span', { style: { fontSize: '0.875rem', color: '#374151' } }, 'Soft chime when tree ripens')
            )
          )
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MemorySeeds));
  </script>
</body>
</html>
