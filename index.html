<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Seeds</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/latest/umd/lucide.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      -webkit-font-smoothing: antialiased;
    }

    @font-face {
      font-family: 'Garamond';
      src: local('Garamond'), local('Georgia'), serif;
    }

    .font-serif {
      font-family: 'Garamond', Georgia, serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    const { useState, useEffect } = React;
    const { Plus, Camera, Upload, Settings, Archive, X, Check } = lucide;

    function MemorySeeds() {
      const [screen, setScreen] = useState('forest');
      const [seeds, setSeeds] = useState([
        { id: 1, type: 'oak', name: 'Family Picnic', photos: 3, created: '2024-01-15', planted: '2024-01-15', daysOld: 55, ripesOn: null, status: 'memory' },
        { id: 2, type: 'cherry', name: "Mom's Birthday", planted: '2024-02-28', ripesOn: '2025-03-10', daysUntil: 28, status: 'growing' },
        { id: 3, type: 'spruce', name: 'Submit Project', planted: '2024-03-01', ripesOn: '2024-03-15', daysUntil: 0, status: 'ripened' },
      ]);
      const [expandedId, setExpandedId] = useState(null);
      const [newSeed, setNewSeed] = useState({ type: 'oak', name: '', date: '', photos: 0 });

      const getTreeStage = (daysUntil, status) => {
        if (status === 'ripened') return 4;
        if (status === 'memory') return 5;
        if (daysUntil > 60) return 1;
        if (daysUntil > 30) return 2;
        if (daysUntil > 0) return 3;
        return 4;
      };

      const TreeSVG = ({ type, stage }) => {
        const isOak = type === 'oak';
        const isCherry = type === 'cherry';
        const isSpruce = type === 'spruce';

        if (isOak && stage === 5) {
          return React.createElement('svg', { viewBox: '0 0 100 120', className: 'w-20 h-24' },
            React.createElement('rect', { x: '42', y: '70', width: '16', height: '40', fill: '#8B6F47', rx: '2' }),
            React.createElement('ellipse', { cx: '50', cy: '50', rx: '35', ry: '40', fill: '#2D5016' }),
            React.createElement('ellipse', { cx: '30', cy: '45', rx: '20', ry: '25', fill: '#3A6B2C' }),
            React.createElement('ellipse', { cx: '70', cy: '45', rx: '20', ry: '25', fill: '#3A6B2C' }),
            React.createElement('ellipse', { cx: '50', cy: '25', rx: '15', ry: '18', fill: '#4A8C3C' }),
            React.createElement('ellipse', { cx: '50', cy: '45', rx: '25', ry: '28', fill: '#4A8C3C', opacity: '0.4' })
          );
        }

        if (isCherry) {
          const colors = [
            { trunk: '#C4A692', leaf: '#E8D5C4' },
            { trunk: '#B8956A', leaf: '#F0DCC4' },
            { trunk: '#8B7355', leaf: '#F5E6D3' },
            { trunk: '#8B7355', leaf: '#FFB6C1' },
          ];
          const c = colors[Math.min(stage - 1, 3)];
          return React.createElement('svg', { viewBox: '0 0 100 120', className: 'w-20 h-24' },
            React.createElement('rect', { x: '44', y: '75', width: '12', height: '40', fill: c.trunk, rx: '2' }),
            React.createElement('circle', { cx: '50', cy: '55', r: 20 + stage * 2, fill: c.leaf, opacity: '0.8' }),
            React.createElement('circle', { cx: '35', cy: '50', r: 12 + stage, fill: c.leaf, opacity: '0.7' }),
            React.createElement('circle', { cx: '65', cy: '50', r: 12 + stage, fill: c.leaf, opacity: '0.7' }),
            React.createElement('circle', { cx: '50', cy: '35', r: 10 + stage, fill: c.leaf, opacity: '0.9' }),
            stage === 4 && [
              React.createElement('circle', { cx: '45', cy: '50', r: '3', fill: '#FFB6C1', opacity: '0.6' }),
              React.createElement('circle', { cx: '55', cy: '45', r: '3', fill: '#FFB6C1', opacity: '0.6' }),
              React.createElement('circle', { cx: '50', cy: '60', r: '3', fill: '#FFB6C1', opacity: '0.6' }),
            ]
          );
        }

        if (isSpruce) {
          const colors = ['#1B4D3E', '#2D6A5C', '#3D8B7D', '#4FA99F'];
          const color = colors[Math.min(stage - 1, 3)];
          return React.createElement('svg', { viewBox: '0 0 100 120', className: 'w-20 h-24' },
            React.createElement('rect', { x: '44', y: '80', width: '12', height: '35', fill: '#5C4033', rx: '2' }),
            React.createElement('polygon', { points: '50,20 30,65 70,65', fill: color }),
            React.createElement('polygon', { points: '50,35 35,65 65,65', fill: colors[Math.min(stage - 1, 3)], opacity: '0.8' }),
            React.createElement('polygon', { points: '50,50 40,75 60,75', fill: color, opacity: '0.9' })
          );
        }

        return null;
      };

      const TreeStageIndicator = ({ stage }) => {
        return React.createElement('div', { className: 'flex gap-1 mt-2' },
          [1, 2, 3, 4, 5].map((s) =>
            React.createElement('div', {
              key: s,
              className: `h-1.5 w-2 rounded-full transition-all ${s <= stage ? 'bg-emerald-400' : 'bg-gray-300'}`,
            })
          )
        );
      };

      const ForestScreen = () => React.createElement('div', { className: 'min-h-screen bg-gradient-to-b from-amber-50 via-emerald-50 to-blue-50 p-4 pb-24' },
        React.createElement('div', { className: 'flex justify-between items-center mb-8 mt-4' },
          React.createElement('h1', { className: 'text-3xl font-serif text-emerald-900' }, 'Your Forest'),
          React.createElement('button', { onClick: () => setScreen('settings'), className: 'p-2 hover:bg-white rounded-lg transition' },
            React.createElement(Settings, { size: 24, className: 'text-emerald-700' })
          )
        ),
        React.createElement('div', { className: 'grid grid-cols-2 gap-6 mb-4' },
          seeds.map((seed) => {
            const stage = getTreeStage(seed.daysUntil, seed.status);
            const isExpanded = expandedId === seed.id;
            return React.createElement('div', { key: seed.id, onClick: () => setExpandedId(isExpanded ? null : seed.id), className: `transition-all cursor-pointer ${isExpanded ? 'col-span-2' : ''}` },
              React.createElement('div', { className: `bg-white rounded-2xl p-4 shadow-lg transition-all border-2 border-transparent hover:border-emerald-200 ${seed.status === 'ripened' ? 'ring-2 ring-amber-300' : ''}` },
                React.createElement('div', { className: 'flex flex-col items-center' },
                  React.createElement(TreeSVG, { type: seed.type, stage: stage }),
                  React.createElement('h3', { className: 'mt-3 text-center font-medium text-gray-800 text-sm' }, seed.name),
                  React.createElement(TreeStageIndicator, { stage: stage }),
                  seed.status !== 'memory' && seed.daysUntil !== null && React.createElement('div', { className: 'mt-2 text-xs text-gray-600' },
                    seed.status === 'ripened'
                      ? React.createElement('span', { className: 'text-amber-600 font-semibold' }, '🌟 Ripened!')
                      : React.createElement('span', null, seed.daysUntil + ' days')
                  ),
                  isExpanded && React.createElement('div', { className: 'mt-4 w-full border-t pt-4 space-y-3' },
                    seed.type === 'oak' && React.createElement('div', { className: 'bg-emerald-50 rounded-lg p-3' },
                      React.createElement('p', { className: 'text-xs text-emerald-900' }, '📸 ' + seed.photos + ' photos saved'),
                      React.createElement('p', { className: 'text-xs text-emerald-700 mt-1' }, 'Captured: ' + seed.created)
                    ),
                    seed.status === 'ripened' && seed.type !== 'oak' && React.createElement('div', { className: 'flex gap-2' },
                      React.createElement('button', {
                        onClick: (e) => {
                          e.stopPropagation();
                          setSeeds(seeds.map((s) => s.id === seed.id ? { ...s, status: 'archived' } : s));
                          setExpandedId(null);
                        },
                        className: 'flex-1 bg-emerald-600 text-white text-xs py-2 rounded-lg hover:bg-emerald-700 transition flex items-center justify-center gap-1'
                      },
                        React.createElement(Check, { size: 14 }), ' Keep'
                      ),
                      React.createElement('button', {
                        onClick: (e) => {
                          e.stopPropagation();
                          setSeeds(seeds.filter((s) => s.id !== seed.id));
                          setExpandedId(null);
                        },
                        className: 'flex-1 bg-gray-300 text-gray-700 text-xs py-2 rounded-lg hover:bg-gray-400 transition flex items-center justify-center gap-1'
                      },
                        React.createElement(X, { size: 14 }), ' Discard'
                      )
                    )
                  )
                )
              )
            );
          })
        ),
        React.createElement('button', {
          onClick: () => setScreen('plant'),
          className: 'fixed bottom-6 right-6 w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 text-white rounded-full shadow-lg flex items-center justify-center hover:shadow-xl transition-all hover:scale-110 active:scale-95'
        },
          React.createElement(Plus, { size: 28 })
        )
      );

      const PlantScreen = () => React.createElement('div', { className: 'min-h-screen bg-gradient-to-b from-amber-50 to-blue-50 p-4 pb-24' },
        React.createElement('div', { className: 'flex items-center gap-3 mb-8 mt-4' },
          React.createElement('button', { onClick: () => setScreen('forest'), className: 'p-2 hover:bg-white rounded-lg transition' },
            React.createElement(X, { size: 24, className: 'text-gray-700' })
          ),
          React.createElement('h2', { className: 'text-2xl font-serif text-emerald-900' }, 'Plant a Seed')
        ),
        React.createElement('div', { className: 'space-y-3 mb-8' },
          [
            { id: 'oak', name: '🌳 Great Oak', desc: 'A cherished past memory' },
            { id: 'cherry', name: '🌸 Cherry Blossom', desc: 'Birthday or annual event' },
            { id: 'spruce', name: '🌲 Dark Spruce', desc: 'Something to remember' },
          ].map((t) =>
            React.createElement('button', {
              key: t.id,
              onClick: () => setNewSeed({ ...newSeed, type: t.id }),
              className: `w-full p-4 rounded-2xl text-left transition border-2 ${
                newSeed.type === t.id
                  ? 'bg-emerald-100 border-emerald-500 shadow-md'
                  : 'bg-white border-gray-200 hover:border-emerald-300'
              }`
            },
              React.createElement('div', { className: 'font-medium text-gray-900' }, t.name),
              React.createElement('div', { className: 'text-xs text-gray-600 mt-1' }, t.desc)
            )
          )
        ),
        React.createElement('div', { className: 'mb-6' },
          React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-2' }, "What's this memory called?"),
          React.createElement('input', {
            type: 'text',
            placeholder: 'e.g., Family Picnic at Lake...',
            value: newSeed.name,
            onChange: (e) => setNewSeed({ ...newSeed, name: e.target.value }),
            className: 'w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none'
          })
        ),
        newSeed.type !== 'oak' && React.createElement('div', { className: 'mb-6' },
          React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-2' }, 'When should it ripen?'),
          React.createElement('input', {
            type: 'date',
            value: newSeed.date,
            onChange: (e) => setNewSeed({ ...newSeed, date: e.target.value }),
            className: 'w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none'
          })
        ),
        React.createElement('div', { className: 'mb-8' },
          React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-3' }, 'Add photos'),
          React.createElement('div', { className: 'flex gap-3' },
            React.createElement('button', { className: 'flex-1 p-4 border-2 border-dashed border-emerald-300 rounded-lg hover:bg-emerald-50 transition flex flex-col items-center gap-2 text-emerald-700' },
              React.createElement(Camera, { size: 20 }),
              React.createElement('span', { className: 'text-xs font-medium' }, 'Take Photo')
            ),
            React.createElement('button', { className: 'flex-1 p-4 border-2 border-dashed border-emerald-300 rounded-lg hover:bg-emerald-50 transition flex flex-col items-center gap-2 text-emerald-700' },
              React.createElement(Upload, { size: 20 }),
              React.createElement('span', { className: 'text-xs font-medium' }, 'Upload')
            )
          )
        ),
        React.createElement('button', {
          onClick: () => {
            if (newSeed.name && (newSeed.type === 'oak' || newSeed.date)) {
              const newId = Math.max(...seeds.map((s) => s.id), 0) + 1;
              const ripesOn = newSeed.date || null;
              const daysUntil = ripesOn
                ? Math.ceil((new Date(ripesOn) - new Date()) / (1000 * 60 * 60 * 24))
                : null;

              setSeeds([
                ...seeds,
                {
                  id: newId,
                  type: newSeed.type,
                  name: newSeed.name,
                  photos: newSeed.photos || 1,
                  created: new Date().toISOString().split('T')[0],
                  planted: new Date().toISOString().split('T')[0],
                  ripesOn,
                  daysUntil,
                  daysOld: 0,
                  status: 'growing',
                },
              ]);
              setNewSeed({ type: 'oak', name: '', date: '', photos: 0 });
              setScreen('forest');
            }
          },
          className: 'w-full p-4 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-medium rounded-lg hover:shadow-lg transition'
        }, '🌱 Plant This Seed')
      );

      const SettingsScreen = () => React.createElement('div', { className: 'min-h-screen bg-gradient-to-b from-amber-50 to-blue-50 p-4 pb-24' },
        React.createElement('div', { className: 'flex items-center gap-3 mb-8 mt-4' },
          React.createElement('button', { onClick: () => setScreen('forest'), className: 'p-2 hover:bg-white rounded-lg transition' },
            React.createElement(X, { size: 24, className: 'text-gray-700' })
          ),
          React.createElement('h2', { className: 'text-2xl font-serif text-emerald-900' }, 'Settings')
        ),
        React.createElement('div', { className: 'bg-white rounded-2xl p-6 mb-6 shadow-lg' },
          React.createElement('h3', { className: 'font-medium text-gray-900 mb-4' }, 'Daily Alert'),
          React.createElement('div', { className: 'space-y-3' },
            [
              { id: 'all', label: 'Show all ripened trees' },
              { id: 'random', label: 'Random reflection' },
              { id: 'none', label: 'No alerts' },
            ].map((opt) =>
              React.createElement('label', { key: opt.id, className: 'flex items-center gap-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50' },
                React.createElement('input', { type: 'radio', name: 'alert', defaultChecked: opt.id === 'all' }),
                React.createElement('span', { className: 'text-sm text-gray-700' }, opt.label)
              )
            )
          )
        ),
        React.createElement('div', { className: 'bg-white rounded-2xl p-6 mb-6 shadow-lg' },
          React.createElement('h3', { className: 'font-medium text-gray-900 mb-4' }, 'Notification Sound'),
          React.createElement('label', { className: 'flex items-center gap-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50' },
            React.createElement('input', { type: 'checkbox', defaultChecked: true }),
            React.createElement('span', { className: 'text-sm text-gray-700' }, 'Soft chime when tree ripens')
          )
        ),
        React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-lg' },
          React.createElement('h3', { className: 'font-medium text-gray-900 mb-4' }, 'Family Groups'),
          React.createElement('button', { className: 'w-full p-3 border-2 border-dashed border-emerald-300 rounded-lg text-emerald-700 font-medium hover:bg-emerald-50 transition' }, '+ Create a Family Group')
        )
      );

      return React.createElement('div', { className: 'bg-white' },
        screen === 'forest' && React.createElement(ForestScreen),
        screen === 'plant' && React.createElement(PlantScreen),
        screen === 'settings' && React.createElement(SettingsScreen)
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MemorySeeds));
  </script>
</body>
</html>
